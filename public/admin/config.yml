# ── Backend ───────────────────────────────────────────────────────────────────
# 1. Go to GitHub → Settings → Developer settings → OAuth Apps → New OAuth App
# 2. Set Authorization callback URL to: https://YOUR-DOMAIN.pages.dev/admin/
# 3. Copy the Client ID (NOT the secret) into app_id below
# 4. Update repo to your GitHub username/repo-name
# ── LOCAL DEV: uses test-repo (no login needed, data resets on refresh) ───────
# ── BEFORE DEPLOYING: switch back to the github backend below ─────────────────
backend:
  name: git-gateway

local_backend: true

# ── PRODUCTION (uncomment when deploying to Cloudflare Pages) ─────────────────
# backend:
#   name: github
#   repo: YOUR_GITHUB_USERNAME/designsprintco-website
#   branch: main
#   auth_type: pkce
#   app_id: YOUR_GITHUB_OAUTH_APP_CLIENT_ID

media_folder: public/images
public_folder: /images

# ── Site Settings ─────────────────────────────────────────────────────────────
collections:
  - name: settings
    label: "⚙️ Site Settings"
    files:
      - name: general
        label: General Settings
        file: content/settings.json
        format: json
        fields:
          - { label: Site Name, name: siteName, widget: string }
          - { label: Tagline, name: tagline, widget: string }
          - { label: Email, name: email, widget: string }
          - { label: Location, name: location, widget: string }
          - { label: Website URL, name: website, widget: string }
          - { label: LinkedIn URL, name: linkedIn, widget: string }
          - { label: Instagram URL, name: instagram, widget: string }
          - { label: Copyright Text, name: copyright, widget: string }

# ── Pages ─────────────────────────────────────────────────────────────────────
  - name: pages
    label: "📄 Pages"
    files:

      - name: home
        label: Home Page
        file: content/pages/home.json
        format: json
        fields:
          - { label: Eyebrow Text, name: eyebrow, widget: string }
          - { label: "Headline Line 1 (e.g. Reclaim Your)", name: h1Line1, widget: string }
          - { label: "Headline Line 2 — Crimson (e.g. Identity.)", name: h1Line2, widget: string }
          - { label: "Headline Line 3 (e.g. Own Your)", name: h1Line3, widget: string }
          - { label: "Headline Line 4 — Gradient (e.g. Future.)", name: h1Line4, widget: string }
          - { label: Subtitle / Subheading, name: subtitle, widget: text }
          - { label: Primary CTA Button, name: ctaPrimary, widget: string }
          - { label: Secondary CTA Button, name: ctaSecondary, widget: string }
          - label: Stats Bar
            name: stats
            widget: list
            fields:
              - { label: Value, name: value, widget: string }
              - { label: Label, name: label, widget: string }

      - name: framework
        label: Framework Page
        file: content/pages/framework.json
        format: json
        fields:
          - label: Positioning Grid (4 cells)
            name: positioning
            widget: list
            fields:
              - { label: Label, name: label, widget: string }
              - { label: Text, name: text, widget: text }
          - label: Archetype Block
            name: archetype
            widget: object
            fields:
              - { label: Title, name: title, widget: string }
              - { label: Text, name: text, widget: text }
          - label: DVF Pillars (3 pillars)
            name: pillars
            widget: list
            fields:
              - { label: Number, name: num, widget: string }
              - { label: Pillar Name, name: pillar, widget: string }
              - { label: Subtitle, name: subtitle, widget: string }
              - { label: Description, name: description, widget: text }
              - label: Bullet Points
                name: items
                widget: list
                field: { label: Item, name: item, widget: string }

      - name: sprint
        label: Reclaim Sprint Page
        file: content/pages/sprint.json
        format: json
        fields:
          - { label: Badge Text, name: badge, widget: string }
          - label: Headline Lines (3 lines)
            name: headline
            widget: list
            field: { label: Line, name: line, widget: string }
          - { label: Duration Info, name: duration, widget: string }
          - { label: Description, name: description, widget: text }
          - label: "This Sprint Is For You If... (bullets)"
            name: forYouIf
            widget: list
            field: { label: Point, name: point, widget: string }
          - { label: Outcomes Section Title, name: outcomesTitle, widget: string }
          - label: Outcomes List
            name: outcomes
            widget: list
            field: { label: Outcome, name: outcome, widget: string }
          - { label: CTA Button Label, name: ctaLabel, widget: string }

      - name: about
        label: About Page
        file: content/pages/about.json
        format: json
        fields:
          - { label: Founder Initials, name: founderInitials, widget: string }
          - { label: Founder Name, name: founderName, widget: string }
          - { label: Founder Role, name: founderRole, widget: string }
          - label: Credential Chips
            name: chips
            widget: list
            field: { label: Chip Text, name: chip, widget: string }
          - { label: Section Tag, name: sectionTag, widget: string }
          - label: Headline Lines
            name: headline
            widget: list
            field: { label: Line, name: line, widget: string }
          - label: Paragraphs
            name: paragraphs
            widget: list
            field: { label: Paragraph, name: paragraph, widget: text }
          - label: Values
            name: values
            widget: list
            fields:
              - { label: Icon (emoji), name: icon, widget: string }
              - { label: Title, name: title, widget: string }
              - { label: Description, name: description, widget: text }
          - label: Brand Voice Words
            name: voiceWords
            widget: list
            fields:
              - { label: Word, name: word, widget: string }
              - { label: Description, name: description, widget: text }

      - name: contact
        label: Contact Page
        file: content/pages/contact.json
        format: json
        fields:
          - { label: Section Tag, name: sectionTag, widget: string }
          - label: Headline Lines
            name: headline
            widget: list
            field: { label: Line, name: line, widget: string }
          - { label: Subtitle, name: subtitle, widget: text }
          - label: Contact Items
            name: contactItems
            widget: list
            fields:
              - { label: Icon (emoji), name: icon, widget: string }
              - { label: Label, name: label, widget: string }
              - { label: Value, name: value, widget: string }
          - { label: Form Title, name: formTitle, widget: string }
          - { label: Form Subtitle, name: formSubtitle, widget: string }
          - { label: Form Note, name: formNote, widget: string }
          - label: Interest Options (dropdown)
            name: interestOptions
            widget: list
            field: { label: Option, name: option, widget: string }
          - { label: "Web3Forms Access Key (get free key at web3forms.com)", name: web3formsKey, widget: string }

# ── Testimonials ──────────────────────────────────────────────────────────────
  - name: testimonials
    label: "⭐ Testimonials"
    folder: content/testimonials
    format: json
    create: true
    slug: "{{slug}}"
    identifier_field: authorName
    fields:
      - { label: Slug (filename, e.g. john-d), name: slug, widget: string }
      - { label: Stars, name: stars, widget: number, default: 5, value_type: int, min: 1, max: 5 }
      - { label: Quote, name: quote, widget: text }
      - { label: Author Name, name: authorName, widget: string }
      - { label: Author Role (e.g. Title → New Title), name: authorRole, widget: string }
      - { label: Initials (2 letters), name: initials, widget: string }
      - label: Avatar Colour
        name: avatarColor
        widget: select
        options:
          - { label: Crimson (red), value: crimson }
          - { label: Amber (orange), value: amber }
          - { label: Gold (yellow), value: gold }
      - { label: Display Order (lower = first), name: order, widget: number, value_type: int }

# ── Blog Posts ────────────────────────────────────────────────────────────────
  - name: posts
    label: "✍️ Blog Posts"
    folder: content/posts
    format: frontmatter
    create: true
    slug: "{{slug}}"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Slug (URL slug, e.g. my-post-title), name: slug, widget: string }
      - { label: Category, name: category, widget: string }
      - { label: Excerpt (1–2 sentences), name: excerpt, widget: text }
      - { label: Read Time (e.g. 5 min read), name: readTime, widget: string }
      - { label: Emoji, name: emoji, widget: string, default: "🔥" }
      - { label: "Emoji Background (CSS rgba, e.g. rgba(255,69,0,0.06))", name: emojiBackground, widget: string }
      - { label: Date, name: date, widget: datetime, date_format: YYYY-MM-DD, time_format: false }
      - { label: Published, name: published, widget: boolean, default: false }
      - { label: Body, name: body, widget: markdown }
